name: Publish Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g. v0.9.1, empty bumps the minor version of the latest release)'
        required: false
        default: ''
      release_title:
        description: 'Release title (empty uses the tag)'
        required: false
        default: ''
      is_draft:
        description: 'Create as a draft?'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      title: ${{ steps.resolve.outputs.title }}
    steps:
      - name: Resolve tag and title
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event.inputs.tag_name }}"
          if [ -z "$tag" ]; then
            latest=$(gh release view --repo ${{ github.repository }} --json tagName --jq .tagName 2>/dev/null || echo "v0.0.0")
            version=${latest#v}
            major=$(echo "$version" | cut -d. -f1)
            minor=$(echo "$version" | cut -d. -f2)
            tag="v$major.$((minor + 1)).0"
          fi
          title="${{ github.event.inputs.release_title }}"
          if [ -z "$title" ]; then
            title="FVD++ $tag"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"

  windows:
    needs: version
    uses: ./.github/workflows/build-windows.yml
    with:
      version: ${{ needs.version.outputs.tag }}
  linux:
    needs: version
    uses: ./.github/workflows/build-linux.yml
    with:
      version: ${{ needs.version.outputs.tag }}
  macos:
    needs: version
    uses: ./.github/workflows/build-macos.yml
    with:
      version: ${{ needs.version.outputs.tag }}

  create-release:
    name: Create Release
    needs: [version, windows, linux, macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-binary

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-binary

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-binary

      - name: Package Track Styles
        run: |
          mkdir -p temp_styles/community
          cp -r track_styles/* temp_styles/community/
          cd temp_styles
          zip -r ../track_styles.zip community
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.title }}
          draft: ${{ github.event.inputs.is_draft }}
          files: |
            fvd-windows-x64.zip
            fvd-linux-x64.zip
            fvd-macos-arm64.zip
            track_styles.zip
